<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Health is Wealth — Trivia (20 Questions)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#0b1324;
      --bg2:#0a1a2e;
      --card: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.12);
      --ink:#f3f4f6;
      --muted: rgba(243,244,246,0.72);
      --accent:#7dd3fc;
      --good:#34d399;
      --warn:#fbbf24;
      --bad:#fb7185;
      --radius: 21px;
      --radius2: 14px;
      --shadow: 0 14px 40px rgba(0,0,0,.35);
      --fz: 22px;
      --max: 560px; /* home-page friendly */
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--ink);
      background:
        radial-gradient(900px 600px at 20% 10%, rgba(125,211,252,0.18), transparent 55%),
        radial-gradient(900px 600px at 80% 0%, rgba(52,211,153,0.12), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      padding: 14px;
    }
    .app{
      max-width: var(--max);
      margin: 0 auto;
    }
    .card{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .hd{
      padding: 14px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    h1{
      margin:0;
      font-size: clamp(22px, 3.6vw, 30px);
      letter-spacing: .3px;
    }
    .sub{
      margin:6px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height:1.35;
      max-width: 420px;
    }
    .chips{display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:flex-end}
    .chip{
      border:1px solid var(--line);
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      padding:7px 10px;
      font-size: 14px;
      color: rgba(243,244,246,0.88);
      white-space: nowrap;
    }
    .chip strong{color:var(--ink)}
    .chip.good{border-color: rgba(52,211,153,.35)}
    .chip.info{border-color: rgba(125,211,252,.35)}
    .chip.warn{border-color: rgba(251,191,36,.35)}
    .bd{padding: 14px 14px}
    .btnRow{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}
    .btn{
      appearance:none;
      border:1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--ink);
      font-size: 16px;
      padding: 11px 14px;
      cursor:pointer;
      transition: transform .05s ease, background .2s ease, border-color .2s ease;
      user-select:none;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .btn:hover{background: rgba(255,255,255,0.09); border-color: rgba(125,211,252,.35)}
    .btn:active{transform: translateY(1px)}
    .btn.primary{
      border-color: rgba(125,211,252,.42);
      background: linear-gradient(180deg, rgba(125,211,252,.22), rgba(125,211,252,.10));
    }
    .btn.good{
      border-color: rgba(52,211,153,.42);
      background: linear-gradient(180deg, rgba(52,211,153,.20), rgba(52,211,153,.08));
    }
    .btn.bad{
      border-color: rgba(251,113,133,.45);
      background: linear-gradient(180deg, rgba(251,113,133,.18), rgba(251,113,133,.07));
    }
    .qWrap{
      border:1px solid var(--line);
      border-radius: var(--radius2);
      background: rgba(0,0,0,0.18);
      padding: 12px;
    }
    .qMeta{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .qMeta .k{
      font-size: 14px;
      color: rgba(243,244,246,0.70);
      letter-spacing:.6px;
      text-transform: uppercase;
    }
    .qMeta .p{
      font-size: 14px;
      color: rgba(243,244,246,0.82);
      border:1px solid var(--line);
      background: rgba(255,255,255,0.05);
      border-radius:999px;
      padding:6px 10px;
    }
    .qText{
      font-size: var(--fz);
      line-height:1.35;
      margin:0 0 12px;
      color: rgba(243,244,246,0.95);
    }
    .answers{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top: 6px;
    }
    .ans{
      text-align:left;
      border:1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      color: var(--ink);
      padding: 12px 12px;
      cursor:pointer;
      transition: background .2s ease, border-color .2s ease, transform .05s ease;
      font-size: 18px;
      line-height:1.25;
    }
    .ans:hover{background: rgba(255,255,255,0.08); border-color: rgba(125,211,252,.35)}
    .ans:active{transform: translateY(1px)}
    .ans[disabled]{opacity:.7; cursor:not-allowed}
    .ans.correct{border-color: rgba(52,211,153,.55); background: rgba(52,211,153,.14)}
    .ans.wrong{border-color: rgba(251,113,133,.55); background: rgba(251,113,133,.12)}
    .feedback{
      margin-top: 12px;
      border:1px solid var(--line);
      border-radius: var(--radius2);
      padding: 12px;
      background: rgba(255,255,255,0.05);
    }
    .feedback .t{
      margin:0 0 6px;
      font-size: 18px;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .feedback .t.ok{color: rgba(52,211,153,.95)}
    .feedback .t.no{color: rgba(251,113,133,.95)}
    .feedback p{
      margin:0;
      font-size: 18px;
      line-height:1.4;
      color: rgba(243,244,246,0.90);
    }
    .foot{
      margin-top: 10px;
      font-size: 14px;
      color: rgba(243,244,246,0.60);
      text-align:center;
    }
    .hr{height:1px; background: var(--line); margin: 12px 0}
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <div class="hd">
        <div>
          <h1>Health is Wealth Trivia</h1>
          <div class="sub">A quick 20-question mini-game to spark wellness habits — then jump into the full 6-week portal.</div>
        </div>
        <div class="chips">
          <div class="chip info">Score: <strong id="scoreChip">0</strong>/20</div>
          <div class="chip warn">Best: <strong id="bestChip">—</strong></div>
        </div>
      </div>

      <div class="bd" id="screen"></div>
    </section>

    <div class="foot">Wix-friendly • Single-file • Saves best score locally</div>
  </div>

<script>
(() => {
  "use strict";

  // ✅ Set your portal page URL here:
  const PORTAL_URL = "https://www.khaemenesacademy.org/health-is-wealth";

  const KEY = "health_is_wealth_trivia_v1";

  const QUESTIONS = [
    { type:"mc", q:"Which approach is usually the most sustainable for wellness?",
      options:["Change everything at once","Small habits repeated consistently","Only relying on motivation"], answerIndex:1,
      explain:"Consistency beats intensity. Small habits are easier to repeat — and repetition creates results." },

    { type:"tf", q:"Any movement is better than none.",
      a:true, explain:"Yes. Even short ‘movement snacks’ help. Start where you are and build gradually." },

    { type:"mc", q:"A beginner-friendly movement plan should be…",
      options:["Painful to prove effort","Realistic and repeatable","Only done when you feel inspired"], answerIndex:1,
      explain:"A plan works when it fits real life. Repeatable beats heroic." },

    { type:"tf", q:"Strength training can count even if you use only bodyweight exercises.",
      a:true, explain:"Correct. Bodyweight squats, wall push-ups, and planks can build strength." },

    { type:"mc", q:"A common public-health baseline for adults is closest to…",
      options:["15 minutes per week total","150 minutes/week moderate activity + 2 strength days","Only stretching daily"], answerIndex:1,
      explain:"A widely used baseline is about 150 minutes/week of moderate activity plus strength work on ~2 days." },

    { type:"mc", q:"The plate method is best described as…",
      options:["A strict diet with banned foods","A flexible way to balance a meal","Only counting calories"], answerIndex:1,
      explain:"The plate method helps balance meals without extreme rules." },

    { type:"tf", q:"Protein and fiber often help you feel fuller for longer.",
      a:true, explain:"Yes — they tend to improve satiety and make meals more steady." },

    { type:"mc", q:"A helpful ‘upgrade’ mindset is…",
      options:["Add nutritious foods before you subtract","Ban everything you love","Skip meals to compensate"], answerIndex:0,
      explain:"Adding protein, fiber, and produce first often improves eating without backlash." },

    { type:"tf", q:"Hydration can affect energy and digestion.",
      a:true, explain:"Correct. Many people notice better energy and digestion with consistent hydration." },

    { type:"mc", q:"A simple recovery meal after activity often includes…",
      options:["Only candy","Protein + carbs + colorful plant food","No food at all"], answerIndex:1,
      explain:"Protein supports muscle repair, carbs restore energy, and plants add micronutrients/fiber." },

    { type:"mc", q:"Many adults do best with roughly how much sleep?",
      options:["2–4 hours","7–9 hours (varies by person)","12–14 hours"], answerIndex:1,
      explain:"Many guidelines suggest about 7–9 hours for most adults, though needs vary." },

    { type:"tf", q:"A consistent wake time can help regulate sleep rhythms.",
      a:true, explain:"Yes. Consistency can strengthen your body’s sleep-wake pattern." },

    { type:"mc", q:"A good wind-down routine is usually…",
      options:["Bright screens in bed","Dim lights + calm repeatable steps","A stressful to-do list"], answerIndex:1,
      explain:"Calm cues (dim lights, gentle routine) help the nervous system shift toward sleep." },

    { type:"tf", q:"If you miss a day of healthy habits, your week is ruined.",
      a:false, explain:"False. One missed day is a normal human moment — reset next meal, next hour, next day." },

    { type:"mc", q:"A helpful stress skill is…",
      options:["Slow exhale breathing","Pretending stress doesn’t exist","Blaming yourself"], answerIndex:0,
      explain:"Slow exhale breathing can signal safety/calm to the body — it’s simple and effective." },

    { type:"tf", q:"Community and support can be part of wellness.",
      a:true, explain:"Correct. Support helps consistency, mood, and resilience." },

    { type:"mc", q:"Time-Restricted Eating (TRE) is best described as…",
      options:["A food list that bans carbs","An eating schedule (a time window)","A vitamin plan"], answerIndex:1,
      explain:"TRE focuses on when you eat (a daily window), not a strict food list." },

    { type:"mc", q:"Mediterranean-style eating often emphasizes…",
      options:["Mostly plants + olive oil + fish often","Only meat and butter","No vegetables"], answerIndex:0,
      explain:"Mediterranean patterns are typically plant-forward with olive oil, legumes, and often fish." },

    { type:"mc", q:"DASH is most known for focusing on…",
      options:["Extreme restriction","Balanced eating with sodium awareness","Only smoothies"], answerIndex:1,
      explain:"DASH is a balanced plan originally designed with blood pressure in mind, including sodium awareness." },

    { type:"mc", q:"The best diet pattern for most people is usually the one that…",
      options:["Is the most extreme","Fits your life and you can sustain","Makes you miserable but ‘works fast’"], answerIndex:1,
      explain:"Sustainability wins. A pattern you can keep is the one that tends to help most long-term." }
  ];

  // ---------- State ----------
  const state = {
    order: [],
    i: 0,
    score: 0,
    locked: false,
    best: loadBest()
  };

  // ---------- Helpers ----------
  const $ = (sel, root=document) => root.querySelector(sel);

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function loadBest(){
    try{
      const raw = localStorage.getItem(KEY);
      if(!raw) return null;
      const parsed = JSON.parse(raw);
      if(typeof parsed.best === "number") return parsed.best;
      return null;
    }catch(e){ return null; }
  }

  function saveBest(best){
    try{
      localStorage.setItem(KEY, JSON.stringify({best, savedAt: Date.now()}));
    }catch(e){}
  }

  function setChips(){
    $("#scoreChip").textContent = String(state.score);
    $("#bestChip").textContent = (state.best == null) ? "—" : String(state.best);
  }

  function screen(html){
    $("#screen").innerHTML = html;
  }

  function startGame(){
    state.order = shuffle([...Array(QUESTIONS.length).keys()]);
    state.i = 0;
    state.score = 0;
    state.locked = false;
    setChips();
    renderQuestion();
  }

  function renderHome(){
    setChips();
    screen(`
      <div class="qWrap">
        <div class="qMeta">
          <div class="k"><strong>How it works</strong></div>
          <div class="p">20 questions • instant feedback</div>
        </div>
        <p class="qText">Ready to test your wellness basics? Finish the trivia, then jump into the full <strong>6-Week Health is Wealth Portal</strong>.</p>

        <div class="btnRow">
          <button class="btn good" id="startBtn" type="button">▶ Start Trivia</button>
          <a class="btn primary" href="${PORTAL_URL}" target="_blank" rel="noopener">✨ Open Full Class Portal</a>
        </div>

        <div class="hr"></div>

        <p style="margin:0; font-size:18px; color: rgba(243,244,246,0.85); line-height:1.45;">
          Tip: This is a learning game — not a test of worth. Small steps count.
        </p>
      </div>
    `);

    $("#startBtn").addEventListener("click", startGame);
  }

  function renderQuestion(){
    const idx = state.order[state.i];
    const q = QUESTIONS[idx];
    state.locked = false;

    let answersHtml = "";

    if(q.type === "tf"){
      answersHtml = `
        <button class="ans" data-v="true" type="button">True</button>
        <button class="ans" data-v="false" type="button">False</button>
      `;
    } else {
      answersHtml = q.options.map((opt, oi) =>
        `<button class="ans" data-v="${oi}" type="button">${escapeHtml(opt)}</button>`
      ).join("");
    }

    screen(`
      <div class="qWrap" role="group" aria-label="Trivia question">
        <div class="qMeta">
          <div class="k">Question</div>
          <div class="p">${state.i+1} / 20</div>
        </div>

        <p class="qText">${escapeHtml(q.q)}</p>

        <div class="answers" id="answers">${answersHtml}</div>

        <div id="feedback"></div>

        <div class="btnRow" style="margin-top:12px">
          <button class="btn" id="quitBtn" type="button">⟵ Quit</button>
          <button class="btn primary" id="nextBtn" type="button" disabled>Next ⟶</button>
          <a class="btn primary" href="${PORTAL_URL}" target="_blank" rel="noopener">✨ Portal</a>
        </div>
      </div>
    `);

    $("#quitBtn").addEventListener("click", renderHome);

    const ansBtns = [...document.querySelectorAll(".ans")];
    ansBtns.forEach(b => b.addEventListener("click", () => chooseAnswer(b, q, ansBtns)));

    $("#nextBtn").addEventListener("click", () => {
      if(state.i < 19){
        state.i++;
        renderQuestion();
      } else {
        renderResults();
      }
    });
  }

  function chooseAnswer(btn, q, ansBtns){
    if(state.locked) return;
    state.locked = true;

    const val = btn.getAttribute("data-v");

    let isCorrect = false;
    let correctVal = "";

    if(q.type === "tf"){
      correctVal = String(q.a);
      isCorrect = (val === correctVal);
    } else {
      correctVal = String(q.answerIndex);
      isCorrect = (val === correctVal);
    }

    // Mark buttons
    ansBtns.forEach(b => {
      const v = b.getAttribute("data-v");
      b.disabled = true;
      if(v === correctVal) b.classList.add("correct");
      if(b === btn && !isCorrect) b.classList.add("wrong");
    });

    if(isCorrect) state.score++;

    setChips();

    const fb = $("#feedback");
    fb.innerHTML = `
      <div class="feedback">
        <div class="t ${isCorrect ? "ok":"no"}">
          ${isCorrect ? "✅ Correct" : "❌ Not quite"}
          <span style="color: rgba(243,244,246,0.75); font-size:14px; border:1px solid var(--line); border-radius:999px; padding:5px 10px; background: rgba(0,0,0,0.18);">
            +${isCorrect ? "1":"0"} point
          </span>
        </div>
        <p>${escapeHtml(q.explain || "Keep going!")}</p>
      </div>
    `;

    $("#nextBtn").disabled = false;
  }

  function renderResults(){
    // save best
    if(state.best == null || state.score > state.best){
      state.best = state.score;
      saveBest(state.best);
    }
    setChips();

    const msg =
      state.score >= 18 ? "Elite wellness basics. Now make it real with the 6-week plan." :
      state.score >= 14 ? "Strong foundation. The portal will turn this into habits." :
      state.score >= 10 ? "Good start. The portal will help you build consistency." :
                          "Perfect place to begin. The portal makes it simple and gentle.";

    screen(`
      <div class="qWrap">
        <div class="qMeta">
          <div class="k">Results</div>
          <div class="p">Final Score</div>
        </div>

        <p class="qText">You scored <strong>${state.score}</strong> / <strong>20</strong>.</p>
        <p style="margin:0; font-size:20px; color: rgba(243,244,246,0.88); line-height:1.45;">${escapeHtml(msg)}</p>

        <div class="btnRow" style="margin-top:14px">
          <button class="btn good" id="playAgainBtn" type="button">🔁 Play Again</button>
          <a class="btn primary" href="${PORTAL_URL}" target="_blank" rel="noopener">✨ Enter the Full Class Portal</a>
        </div>

        <div class="hr"></div>

        <p style="margin:0; font-size:18px; color: rgba(243,244,246,0.80); line-height:1.45;">
          Next best step: pick <strong>one small habit</strong> and repeat it for 7 days.
        </p>
      </div>
    `);

    $("#playAgainBtn").addEventListener("click", startGame);
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  // init
  renderHome();
})();
</script>
</body>
</html>
