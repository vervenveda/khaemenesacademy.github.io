<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khaemenes Academy — Mini IQ Style Test</title>
<style>
body {
  font-family: 'Georgia', serif;
  background: #0e0d0b;
  color: #f1e9d2;
  margin: 0;
  padding: 0;
}
header {
  text-align: center;
  padding: 24px;
  background: #1c1b17;
  border-bottom: 3px solid #d4b352;
}
h1 {
  color: #d4b352;
  margin: 0;
}
.container {
  max-width: 777px;
  margin: 33px auto;
  background: #1e1d1b;
  padding: 24px;
  border-radius: 11px;
  border: 1px solid #b3922f;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}
.question {
  margin-bottom: 24px;
  border-bottom: 3px dashed #444;
  padding-bottom: 11px;
}
.question h3 {
  margin-bottom: 14px;
  line-height: 1.4;
}
.question h3 .qNum {
  color: #d4b352;
  margin-right: 14px;
  font-weight: normal;
}
.option label {
  display: block;
  margin-left: 33px;
  margin-bottom: 14px;
  cursor: pointer;
}
.progress-bar {
  height: 11px;
  background: #333;
  border: 1px solid #b3922f;
  border-radius: 7px;
  overflow: hidden;
  margin-bottom: 11px;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(to right, #b3922f, #f1e9d2);
  transition: width 0.3s ease;
}
#nav {
  text-align: center;
  margin-top: 14px;
}
button {
  padding: 11px 14px;
  margin: 4px;
  border-radius: 6px;
  border: 1px solid #b3922f;
  background: #f1e9d2;
  color: #000;
  cursor: pointer;
}
button:hover {
  background: #fff8dc;
}
.timer {
  text-align: right;
  font-size: 0.9rem;
  color: #d4b352;
}
.toggle-switch {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  justify-content: flex-end;
}
.toggle-switch input {
  accent-color: #d4b352;
}

/* Result card + scoring */
.result-card {
  padding: 16px;
  border-radius: 9px;
  background: #151411;
  border: 1px solid #b3922f;
  margin-bottom: 18px;
}
.result-main-score {
  font-size: 1.4rem;
  color: #d4b352;
  margin-bottom: 8px;
}
.result-subtitle {
  font-size: 0.95rem;
  margin-bottom: 4px;
}
.result-tagline {
  font-size: 0.9rem;
  color: #e0d2aa;
  margin-top: 6px;
}
.result-meta {
  font-size: 0.8rem;
  color: #f6e7be;
  margin-top: 8px;
}

/* Domain breakdown */
.domain-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 8px;
  margin-top: 10px;
}
.domain-pill {
  padding: 8px 10px;
  border-radius: 8px;
  background: #22211e;
  border: 1px solid #5c4a1b;
  font-size: 0.82rem;
}
.domain-pill strong {
  display: block;
  margin-bottom: 4px;
  color: #d4b352;
}

/* Share panel */
.share-panel {
  margin-top: 20px;
  padding: 14px;
  border-radius: 9px;
  background: #151411;
  border: 1px solid #b3922f;
}
.share-panel h3 {
  margin-top: 0;
  color: #d4b352;
}
.share-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.share-buttons button,
.share-buttons a {
  font-size: 0.85rem;
  padding: 8px 10px;
  border-radius: 16px;
  border: 1px solid #b3922f;
  background: #f1e9d2;
  color: #000;
  text-decoration: none;
  cursor: pointer;
}
.share-buttons button:hover,
.share-buttons a:hover {
  background: #fff8dc;
}
.test-url {
  font-family: monospace;
  color: #f6e7be;
}

/* Print styling */
@media print {
  body {
    background: #ffffff;
    color: #000000;
  }
  header,
  .toggle-switch,
  .timer,
  .progress-bar,
  #progressText,
  #nav,
  .share-buttons button[data-share="native"],
  .share-buttons button[data-share="copy"],
  .share-buttons button[data-share="download"],
  .share-buttons a {
    display: none !important;
  }
  .container {
    box-shadow: none;
    border: none;
    margin: 0;
    padding: 16px;
  }
  .result-card {
    border: 1px solid #000;
    background: #ffffff;
    color: #000000;
  }
  .share-panel {
    border: none;
    background: #ffffff;
    color: #000000;
  }
}
</style>
</head>
<body>
<header>
  <h1>Khaemenes Academy <br> Mini IQ Style Test</h1>
  <p>Sharpen your reasoning and problem-solving skills.</p>
</header>

<div class="container">
  <div class="toggle-switch">
    <label for="timerToggle">Enable Timer</label>
    <input type="checkbox" id="timerToggle">
  </div>
  <div class="timer" id="timerDisplay">Timer: OFF</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <p id="progressText">0 / 20 answered</p>

  <div id="pageContent"></div>

  <div id="nav">
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
    <button id="saveBtn">Save Progress</button>
  </div>
</div>

<script>
// ---------- Utility ----------
function el(id){ return document.getElementById(id); }
function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function formatTime(t){
  const min = Math.floor(t / 60).toString().padStart(2, "0");
  const sec = (t % 60).toString().padStart(2, "0");
  return `${min}:${sec}`;
}

// ---------- Global ----------
const TEST_URL = "https://www.khaemenesacademy.org/iq";
const TOTAL_Q = 20;
const ITEMS_PER_PAGE = 10;

let allQuestions = [];
let pages = [];
let currentPage = 0;

let timer = null;
let timeElapsed = 0;
let timerEnabled = false;

// store answers across pages: key = question index (1..TOTAL_Q), value = chosen option
let answers = {};

// ---------- Question Bank with domains ----------
const QUESTION_BANK = [

    domain: "number",

  },
  {
    q: "Which number comes next in the sequence: 4, 6, 9, 13, 18, ?",

  // Arithmetic word problems (domain: arithmetic)
  {

    domain: "arithmetic",

    q: "A book has 240 pages. You read the same number of pages each day and finish in 6 days. How many pages do you read per day?",

  {

  {

    domain: "pattern",

    ans: "Saturday"

  {

    domain: "pattern",

    q: "Which symbol should come next in the pattern: triangle, square, triangle, square, ?",

  {
    q: "A code replaces every vowel with the next letter in the alphabet (A→B, E→F, I→J, O→P, U→V) and leaves other letters the same. Under this code, what does 'RAIN' become?",
    domain: "mixed",
    opts: ["RBIJ","RBJN","SBIJ","SBJN"],
    ans: "RBJN"
  },
  {
    q: "Four people — Ava, Ben, Cara, and Dan — are standing in a line. Ben is somewhere before Cara. Dan is not at either end. Which person cannot be standing at the front of the line?",
    domain: "mixed",

    ans: "Dan"
  },
  {

    domain: "mixed",

  },
  {

// ---------- Build a random set of TOTAL_Q questions ----------
function generateSet(){
  const pool = shuffle(QUESTION_BANK.slice());
  return pool.slice(0, TOTAL_Q);
}

// ---------- Pagination & rendering ----------
function paginate(list){
  const out = [];
  for(let i = 0; i < list.length; i += ITEMS_PER_PAGE){
    out.push(list.slice(i, i + ITEMS_PER_PAGE));
  }
  return out;
}

function updateProgress(){
  const answered = Object.keys(answers).length;
  const pct = Math.round((answered / TOTAL_Q) * 100);
  el("progressFill").style.width = pct + "%";
  el("progressText").textContent = `${answered} / ${TOTAL_Q} answered`;
}

function renderPage(i){
  currentPage = i;
  const wrap = el("pageContent");
  wrap.innerHTML = "";
  const page = pages[currentPage];

  page.forEach((q, idx) => {
    const globalIndex = currentPage * ITEMS_PER_PAGE + idx + 1;
    const div = document.createElement("div");
    div.className = "question";
    const optionsHtml = q.opts.map(o => {
      const checked = answers[globalIndex] === o ? " checked" : "";
      return `<label class="option"><input type="radio" name="q${globalIndex}" value="${o}"${checked}> ${o}</label>`;
    }).join("");
    div.innerHTML =
      `<h3><span class="qNum">Q${globalIndex}.</span>${q.q}</h3>` +
      optionsHtml;
    wrap.appendChild(div);
  });

  updateProgress();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ---------- Test flow ----------
function initTest(){
  allQuestions = generateSet();
  pages = paginate(allQuestions);
  currentPage = 0;
  answers = {};
  timeElapsed = 0;

  if(timer){
    clearInterval(timer);
    timer = null;
  }

  const toggle = el("timerToggle");
  timerEnabled = !!(toggle && toggle.checked);
  if(timerEnabled){
    el("timerDisplay").textContent = "Timer: 00:00";
    startTimer();
  }else{
    el("timerDisplay").textContent = "Timer: OFF";
  }

  renderPage(0);
  updateProgress();
}

function wireShareButtons(summaryText){
  const nativeBtn = document.querySelector('[data-share="native"]');
  const copyBtn = document.querySelector('[data-share="copy"]');
  const downloadBtn = document.querySelector('[data-share="download"]');
  const printBtn = document.querySelector('[data-share="print"]');
  const restartBtn = document.querySelector('[data-share="restart"]');

  if(restartBtn){
    restartBtn.addEventListener("click", () => initTest());
  }

  if(nativeBtn){
    if(navigator.share){
      nativeBtn.addEventListener("click", () => {
        navigator.share({
          title: "Khaemenes Academy — Mini IQ Style Test",
          text: summaryText,
          url: TEST_URL
        }).catch(() => {});
      });
    }else{
      nativeBtn.addEventListener("click", () => {
        alert("Your browser doesn't support the native share dialog. Try the Copy Link option instead.");
      });
    }
  }

  if(copyBtn){
    copyBtn.addEventListener("click", () => {
      const full = `${summaryText} ${TEST_URL}`;
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(full)
          .then(() => alert("Link + summary copied to clipboard!"))
          .catch(() => alert("Copy failed. You can highlight and copy manually."));
      }else{
        alert("Copy not supported. You can highlight the URL and copy it manually.");
      }
    });
  }

  if(downloadBtn){
    downloadBtn.addEventListener("click", () => {
      const text = `Khaemenes Academy — Mini IQ Style Test\n\nResult summary:\n\n${summaryText}\n\nThis is a practice reasoning sampler, not a clinical IQ test.\nTake the test here: ${TEST_URL}\n`;
      const blob = new Blob([text], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "khaemenes-mini-iq-style-result.txt";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  }

  if(printBtn){
    printBtn.addEventListener("click", () => window.print());
  }
}

function gradeResults(){
  const total = TOTAL_Q;
  let correct = 0;
  const domainStats = {}; // domain -> {total, correct}

  allQuestions.forEach((q, idx) => {
    const domain = q.domain || "mixed";
    if(!domainStats[domain]){
      domainStats[domain] = { total: 0, correct: 0 };
    }
    domainStats[domain].total++;

    const chosen = answers[idx + 1];
    if(chosen && chosen === q.ans){
      correct++;
      domainStats[domain].correct++;
    }
  });

  const scorePercent = Math.round((correct / total) * 100);

  // KA Reasoning Index: simple 80–120 scale for fun (not clinical IQ)
  const reasoningIndex = 80 + Math.round((scorePercent / 100) * 40);

  let band = "";
  let bandDesc = "";
  if(scorePercent >= 90){
    band = "Strategist Tier";
    bandDesc = "High accuracy across this mini-set. Patterns and rules click quickly for you.";
  }else if(scorePercent >= 75){
    band = "Analyst Tier";
    bandDesc = "Strong reasoning with room to sharpen tricky items and speed.";
  }else if(scorePercent >= 55){
    band = "Explorer Tier";
    bandDesc = "Solid foundation with plenty of space to grow through practice.";
  }else{
    band = "Warm-Up Tier";
    bandDesc = "Think of this as a warm-up lap. The more puzzles you see, the faster your brain adapts.";
  }

  // Timer wrap-up
  stopTimer();
  let timeNote = "";
  let paceNote = "";
  if(timerEnabled && timeElapsed > 0){
    const formatted = formatTime(timeElapsed);
    const perQ = timeElapsed / total;
    el("timerDisplay").textContent = `Final time: ${formatted}`;
    timeNote = `You used about ${formatted} for ${total} questions (~${perQ.toFixed(1)}s per question).`;
    if(perQ < 15){
      paceNote = "You worked very quickly—just check that speed isn’t costing you accuracy.";
    }else if(perQ < 30){
      paceNote = "Balanced pace: a healthy mix of speed and deliberation.";
    }else{
      paceNote = "Deliberate pace: you take time to think things through carefully.";
    }
  }else{
    el("timerDisplay").textContent = "Timer: OFF (not used for this run).";
  }

  // Domain breakdown HTML
  const friendlyLabels = {
    number: "Number Patterns",
    arithmetic: "Quantitative & Word Problems",
    logic: "Logic & Syllogisms",
    verbal: "Verbal Analogies",
    pattern: "Sequences, Time & Direction",
    mixed: "Codes & Mixed Reasoning"
  };
  const domainOrder = ["number","arithmetic","logic","verbal","pattern","mixed"];

  let domainHtml = '<div class="domain-grid">';
  domainOrder.forEach(key => {
    const stat = domainStats[key];
    if(!stat) return;
    const pct = stat.total ? Math.round((stat.correct / stat.total) * 100) : 0;
    domainHtml += `
      <div class="domain-pill">
        <strong>${friendlyLabels[key]}</strong>
        <span>${stat.correct}/${stat.total} correct (${pct}%)</span>
      </div>
    `;
  });
  domainHtml += "</div>";

  // Share text + URLs
  const shareText = `I just scored ${scorePercent}% (KA Reasoning Index ${reasoningIndex}) on the Khaemenes Academy Mini IQ-Style Test!`;
  const encodedText = encodeURIComponent(shareText);
  const encodedUrl = encodeURIComponent(TEST_URL);
  const tweetUrl = `https://twitter.com/intent/tweet?text=${encodedText}&url=${encodedUrl}`;
  const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}&quote=${encodedText}`;
  const waUrl = `https://api.whatsapp.com/send?text=${encodedText}%20${encodedUrl}`;

  el("pageContent").innerHTML = `
    <div class="result-card">
      <div class="result-main-score">Your Score: ${scorePercent}%</div>
      <div class="result-subtitle">Correct answers: ${correct} / ${total}</div>
      <div class="result-subtitle">KA Reasoning Index: <strong>${reasoningIndex}</strong></div>
      <div class="result-tagline">${band} — ${bandDesc}</div>
      ${timeNote ? `<p class="result-meta">${timeNote}<br>${paceNote}</p>` : ""}
      <p class="result-meta">
        This is a practice reasoning sampler, <strong>not</strong> a clinical IQ test.
        Scores are for reflection, growth, and fun.
      </p>
      <h3 style="margin-top:14px;">Your thinking profile</h3>
      ${domainHtml}
    </div>
    <div class="share-panel">
      <h3>Share or keep this result</h3>
      <p class="result-meta">
        Save it as a PDF, share with friends, or challenge them to beat your score at
        <span class="test-url">${TEST_URL}</span>.
      </p>
      <div class="share-buttons">
        <button type="button" data-share="restart">Retake test</button>
        <button type="button" data-share="native">Share from device</button>
        <button type="button" data-share="copy">Copy link + summary</button>
        <button type="button" data-share="download">Download text summary</button>
        <button type="button" data-share="print">Print result card</button>
        <a href="${tweetUrl}" target="_blank" rel="noopener">Post on X</a>
        <a href="${fbUrl}" target="_blank" rel="noopener">Share on Facebook</a>
        <a href="${waUrl}" target="_blank" rel="noopener">Share on WhatsApp</a>
      </div>
    </div>
  `;

  wireShareButtons(shareText);
}

// ---------- Timer ----------
function startTimer(){
  if(timer){
    clearInterval(timer);
  }
  timeElapsed = 0;
  timer = setInterval(() => {
    timeElapsed++;
    el("timerDisplay").textContent = `Timer: ${formatTime(timeElapsed)}`;
  }, 1000);
}

function stopTimer(){
  if(timer){
    clearInterval(timer);
    timer = null;
  }
}

// Timer toggle
el("timerToggle").addEventListener("change", (e) => {
  timerEnabled = e.target.checked;
  if(timerEnabled){
    startTimer();
  }else{
    stopTimer();
    el("timerDisplay").textContent = "Timer: OFF";
  }
});

// ---------- Event Bindings ----------
document.addEventListener("change", e => {
  if(e.target.matches("input[type=radio]")){
    const name = e.target.name || "";
    if(name.startsWith("q")){
      const idx = parseInt(name.slice(1), 10);
      if(!isNaN(idx)){
        answers[idx] = e.target.value;
      }
    }
    updateProgress();
  }
});

el("nextBtn").onclick = () => {
  if(currentPage < pages.length - 1){
    renderPage(currentPage + 1);
  }else{
    gradeResults();
  }
};

el("prevBtn").onclick = () => {
  if(currentPage > 0){
    renderPage(currentPage - 1);
  }
};

el("saveBtn").onclick = () => {
  alert("Progress is currently kept only in this session. A local save slot system can be added later.");
};

// ---------- Init ----------
window.onload = () => initTest();
</script>
</body>
</html>
