<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Khaemenes GED Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,system-ui;
background:#0a1326;
color:white;
margin:0;
padding:20px;
}

.app{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
}

.panel{
background:#162041;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.week{
display:inline-block;
padding:10px 14px;
margin:5px;
background:#1f2d5a;
border-radius:8px;
cursor:pointer;
}

.week.done{
background:#2c8f5f;
}

button{
padding:10px 16px;
margin-top:10px;
cursor:pointer;
border-radius:8px;
border:none;
background:#4da3ff;
color:white;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

.quizQ{
margin-top:15px;
}

</style>
</head>

<body>

<div class="app">

<h1>GED 42-Week Academy</h1>

<div class="panel">

<h3>Progress</h3>

<div id="progressText"></div>

<div id="weeks"></div>

</div>


<div class="panel" id="lessonPanel">

<h2 id="lessonTitle">Select Week</h2>

<div id="lessonText"></div>

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit Quiz</button>

</div>


<div class="panel">

<h3>AI Tutor</h3>

<input id="aiQuestion" placeholder="Ask a GED question">

<button onclick="askTutor()">Ask Tutor</button>

<div id="aiAnswer"></div>

</div>


<div class="panel">

<h3>Certificate</h3>

<button onclick="generateCertificate()">Generate Graduation Certificate</button>

</div>


<div class="panel">

<h3>Backup</h3>

<button onclick="exportData()">Export Progress</button>
<input type="file" onchange="importData(event)">

</div>

</div>

<script>

const APP_KEY="ged_academy_data";

let data=JSON.parse(localStorage.getItem(APP_KEY)||`{
"completed":[],
"streak":0
}`);

function save(){
localStorage.setItem(APP_KEY,JSON.stringify(data));
}


const CURRICULUM=[

{title:"Orientation",text:"Understand the GED test structure."},

{title:"Diagnostics",text:"Take practice diagnostics."},

{title:"Main Idea",text:"Identify the central idea of passages."},

{title:"Reading Evidence",text:"Support answers with evidence."},

{title:"Grammar Basics",text:"Fix sentence fragments."},

{title:"Punctuation",text:"Use commas and apostrophes."},

{title:"Comparing Texts",text:"Analyze multiple passages."},

{title:"Essay Writing",text:"Write structured arguments."},

{title:"Timed Essay",text:"Practice GED essay timing."},

{title:"Essay Review",text:"Improve clarity and evidence."},

{title:"RLA Review",text:"Mixed reading practice."},

{title:"RLA Checkpoint",text:"Evaluate skills."},

{title:"Math Basics",text:"Fractions decimals percents."},

{title:"Ratios",text:"Understand proportions."},

{title:"Integers",text:"Work with negatives."},

{title:"Algebra Basics",text:"Solve simple equations."},

{title:"Inequalities",text:"Graph inequalities."},

{title:"Slope",text:"Understand linear relationships."},

{title:"Systems",text:"Solve systems of equations."},

{title:"Geometry",text:"Area and volume."},

{title:"Statistics",text:"Mean median mode."},

{title:"Probability",text:"Basic probability."},

{title:"Calculator Skills",text:"TI calculator practice."},

{title:"Math Review",text:"Mixed problems."},

{title:"Math Checkpoint",text:"Skill evaluation."},

{title:"Scientific Method",text:"Understand experiments."},

{title:"Graphs",text:"Interpret scientific charts."},

{title:"Life Science",text:"Cells and genetics."},

{title:"Physical Science",text:"Energy and motion."},

{title:"Earth Science",text:"Climate and geology."},

{title:"Science Experiments",text:"Analyze results."},

{title:"Science Review",text:"Mixed practice."},

{title:"Science Checkpoint",text:"Skill test."},

{title:"Civics",text:"Government structure."},

{title:"US History",text:"Major events."},

{title:"Economics",text:"Supply demand."},

{title:"Geography",text:"Maps and regions."},

{title:"Primary Sources",text:"Interpret documents."},

{title:"Social Studies Review",text:"Mixed practice."},

{title:"Social Checkpoint",text:"Evaluate knowledge."},

{title:"Weak Skill Review",text:"Target weak areas."},

{title:"Final Exam Prep",text:"Prepare for real GED."}

];


function buildWeeks(){

let html="";

CURRICULUM.forEach((w,i)=>{

let done=data.completed.includes(i);

html+=`<div class="week ${done?"done":""}" onclick="openWeek(${i})">${i+1}</div>`;

});

document.getElementById("weeks").innerHTML=html;

updateProgress();

}


function updateProgress(){

document.getElementById("progressText").innerText=
data.completed.length+" / 42 Weeks Complete";

}


let currentWeek=null;


function openWeek(i){

currentWeek=i;

let w=CURRICULUM[i];

document.getElementById("lessonTitle").innerText=
"Week "+(i+1)+" : "+w.title;

document.getElementById("lessonText").innerText=w.text;

generateQuiz();

}


function generateQuiz(){

let q=`
<div class="quizQ">Question: What is the key idea of this lesson?</div>

<label><input type="radio" name="q">Practice skills</label><br>
<label><input type="radio" name="q">Ignore learning</label><br>
<label><input type="radio" name="q">Memorize nothing</label><br>
`;

document.getElementById("quiz").innerHTML=q;

}


function submitQuiz(){

if(currentWeek===null)return;

if(!data.completed.includes(currentWeek))
data.completed.push(currentWeek);

save();

buildWeeks();

alert("Week Completed");

}


const AI_KB={

slope:"Slope = (y2 - y1)/(x2 - x1). It measures steepness.",

fraction:"Fractions represent parts of a whole.",

scientific:"Scientific method: question hypothesis experiment analyze conclude.",

government:"The US government has three branches: legislative executive judicial.",

economics:"Supply and demand determine price."
};


function askTutor(){

let q=document.getElementById("aiQuestion").value.toLowerCase();

let ans="I am still learning.";

for(let k in AI_KB){

if(q.includes(k)) ans=AI_KB[k];

}

document.getElementById("aiAnswer").innerText=ans;

}


function generateCertificate(){

if(data.completed.length<42){

alert("Complete all 42 weeks first.");

return;

}

let name=prompt("Student Name");

let text=

`Khaemenes Academy

GED Preparation Certificate

This certifies that

${name}

has completed the 42 Week GED Academy Program.

Date: ${new Date().toLocaleDateString()}
`;

let blob=new Blob([text]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="GED_certificate.txt";

a.click();

}


function exportData(){

let blob=new Blob([JSON.stringify(data)]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="ged_progress.json";

a.click();

}


function importData(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(){

data=JSON.parse(reader.result);

save();

buildWeeks();

};

reader.readAsText(file);

}


buildWeeks();

</script>

</body>
</html>
