function loadWeek(week) {
  // Highlight active button
  Array.from(weekNav.children).forEach(btn => btn.classList.remove('active'));
  weekNav.children[week-1].classList.add('active');

  // Load content
  content.innerHTML = `<h2>Week ${week}</h2>`;

  // Lessons
  content.innerHTML += '<h3>Lessons</h3><ul>' + curriculum[week].lessons.map(l => `<li>${l}</li>`).join('') + '</ul>';

  // Readings
  content.innerHTML += '<h3>Readings</h3><ul>' + curriculum[week].readings.map(r => `<li>${r}</li>`).join('') + '</ul>';

  // Quiz
  content.innerHTML += '<h3>Weekly Quiz</h3><div id="quiz"></div>';
  loadQuiz(curriculum[week].quiz);
}

function loadQuiz(quizData) {
  const quizDiv = document.getElementById('quiz');
  quizDiv.innerHTML = '';
  quizData.forEach((q, idx) => {
    const qDiv = document.createElement('div');
    qDiv.className = 'quiz-question';
    qDiv.innerHTML = `<strong>Q${idx+1}: ${q.question}</strong>`;

    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'quiz-options';
    q.options.forEach((opt, i) => {
      const optBtn = document.createElement('button');
      optBtn.textContent = opt;
      optBtn.onclick = () => {
        if (i === q.answer) { alert('Correct!'); } else { alert(`Incorrect. Correct answer: ${q.options[q.answer]}`); }
      };
      optionsDiv.appendChild(optBtn);
    });
    qDiv.appendChild(optionsDiv);
    quizDiv.appendChild(qDiv);
  });
}
