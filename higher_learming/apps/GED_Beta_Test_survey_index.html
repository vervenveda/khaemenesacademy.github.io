<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GED Beta Testing Survey</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 700px; margin: 20px auto; padding: 10px; }
  h2 { text-align: center; }
  label { display: block; margin-top: 15px; font-weight: bold; }
  input[type="text"], textarea, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
  button { margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  textarea { resize: vertical; }
  .char-counter { font-size: 0.85em; color: #555; text-align: right; }
  #summary { border: 1px solid #ccc; padding: 10px; margin-top: 20px; display: none; background: #f9f9f9; }
</style>
</head>
<body>

<h2>GED Portal Beta Testing Survey</h2>
<p>Please fill out the survey below. Click "Send Survey" when finished. Your feedback helps improve the portal!</p>

<form id="surveyForm">
  <!-- Section 1: Curriculum Clarity -->
  <label for="clarity1">1. How clear were the lessons? (1=Very unclear, 5=Very clear)</label>
  <select id="clarity1" required>
    <option value="">Select</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>

  <label for="objectives">2. Were the learning objectives clear?</label>
  <select id="objectives" required>
    <option value="">Select</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>

  <label for="coverage">3. Did the content cover expected GED topics?</label>
  <select id="coverage" required>
    <option value="">Select</option>
    <option>Yes</option>
    <option>Somewhat</option>
    <option>No</option>
  </select>

  <label for="clarityComments">4. Any topics needing more explanation? (max 300 chars)</label>
  <textarea id="clarityComments" rows="3" maxlength="300" oninput="updateCounter('clarityCommentsCounter','clarityComments')"></textarea>
  <div class="char-counter" id="clarityCommentsCounter">0 / 300</div>

  <!-- Section 2: Pacing -->
  <label for="pacing">5. How manageable was the 42-week pacing? (1=Too fast, 5=Too slow)</label>
  <select id="pacing" required>
    <option value="">Select</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>

  <label for="selfPace">6. Were you able to move at your own pace?</label>
  <select id="selfPace" required>
    <option value="">Select</option>
    <option>Yes</option>
    <option>Sometimes</option>
    <option>No</option>
  </select>

  <label for="overwhelmed">7. Did you feel overwhelmed or rushed? If yes, specify week/topic (max 300 chars)</label>
  <textarea id="overwhelmed" rows="2" maxlength="300" oninput="updateCounter('overwhelmedCounter','overwhelmed')"></textarea>
  <div class="char-counter" id="overwhelmedCounter">0 / 300</div>

  <!-- Section 3: Engagement -->
  <label for="engagement">8. How engaging were the lessons? (1=Not engaging, 5=Very engaging)</label>
  <select id="engagement" required>
    <option value="">Select</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>

  <label for="quizzes">9. Did quizzes reinforce learning?</label>
  <select id="quizzes" required>
    <option value="">Select</option>
    <option>Yes, very helpful</option>
    <option>Somewhat helpful</option>
    <option>Not helpful</option>
  </select>

  <label for="moreInteractive">10. Would you like more interactive exercises? (max 300 chars)</label>
  <textarea id="moreInteractive" rows="2" maxlength="300" oninput="updateCounter('moreInteractiveCounter','moreInteractive')"></textarea>
  <div class="char-counter" id="moreInteractiveCounter">0 / 300</div>

  <!-- Section 4: Usability & Feedback -->
  <label for="issues">11. Any technical issues? (max 300 chars)</label>
  <textarea id="issues" rows="2" maxlength="300" oninput="updateCounter('issuesCounter','issues')"></textarea>
  <div class="char-counter" id="issuesCounter">0 / 300</div>

  <label for="satisfaction">12. Overall satisfaction (1=Very dissatisfied, 5=Very satisfied)</label>
  <select id="satisfaction" required>
    <option value="">Select</option>
    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
  </select>

  <label for="additional">13. Additional feedback or suggestions (max 500 chars)</label>
  <textarea id="additional" rows="3" maxlength="500" oninput="updateCounter('additionalCounter','additional')"></textarea>
  <div class="char-counter" id="additionalCounter">0 / 500</div>

  <button type="button" onclick="previewSurvey()">Preview Survey</button>
</form>

<div id="summary"></div>

<script>
function updateCounter(counterId, textareaId) {
  const counter = document.getElementById(counterId);
  const textarea = document.getElementById(textareaId);
  counter.textContent = `${textarea.value.length} / ${textarea.maxLength}`;
}

function previewSurvey() {
  const form = document.getElementById('surveyForm');
  const requiredFields = form.querySelectorAll('[required]');
  for (let field of requiredFields) {
    if (!field.value) {
      alert('Please complete all required fields before previewing.');
      field.focus();
      return;
    }
  }

  const fields = [
    'clarity1','objectives','coverage','clarityComments',
    'pacing','selfPace','overwhelmed',
    'engagement','quizzes','moreInteractive',
    'issues','satisfaction','additional'
  ];

  let body = '';
  fields.forEach(f => {
    const el = document.getElementById(f);
    const label = el.previousElementSibling.innerText;
    body += label + '\n' + (el.value || 'N/A') + '\n\n';
  });

  const summaryDiv = document.getElementById('summary');
  summaryDiv.style.display = 'block';
  summaryDiv.innerHTML = `<h3>Survey Preview</h3><pre>${body}</pre>
  <button onclick="sendSurvey('${encodeURIComponent(body)}')">Send Survey</button>`;
}

function sendSurvey(encodedBody) {
  const mailBody = encodedBody || '';
  const subject = encodeURIComponent('GED Portal Beta Survey');
  window.location.href = `mailto:vervenveda@proton.me?subject=${subject}&body=${mailBody}`;
}
</script>

</body>
</html>
