<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sovereign Career-Zone Transcript Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  font-family: Georgia, serif;
  background:#494A4D;
  margin:0;
  padding:20px;
}
.container{
  max-width:1100px;
  margin:auto;
  background:#fff;
  padding:30px;
  box-shadow:0 0 15px rgba(0,0,0,.15);
}
h1,h2,h3{
  text-align:center;
  margin-bottom:10px;
}
.section{
  margin-top:30px;
}
label{
  display:block;
  margin-top:10px;
}
input,select{
  padding:6px;
  width:100%;
}
button{
  margin-top:15px;
  padding:10px 15px;
  cursor:pointer;
}
.transcript{
  margin-top:40px;
  border:2px solid #000;
  padding:30px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
th,td{
  border:1px solid #000;
  padding:6px;
  text-align:left;
}
.highlight{
  background:#fff6d6;
  font-weight:bold;
}
.summary{
  margin-top:20px;
  font-style:italic;
}
.seal{
  text-align:center;
  font-size:60px;
  opacity:0.05;
  margin-top:40px;
}
@media print{
  body{background:#fff;}
  button{display:none;}
}
</style>
</head>

<body>
<div class="container">
<h1>Career-Zone High School Transcript</h1>

<div class="section">
<h3>Student Information</h3>
<label>Student Name<input id="studentName"></label>
<label>School / Academy<input id="schoolName" value="Khaemenes Academy"></label>
<label>Graduation Year<input id="gradYear"></label>

<label>Career Concentration
<select id="careerSelect"></select>
</label>
</div>

<div class="section">
<h3>Add Elective</h3>
<label>Course Name<input id="electiveName"></label>
<label>Credits<input id="electiveCredits" type="number" step="0.5"></label>
<label>Grade
<select id="electiveGrade">
<option>A</option><option>B</option><option>C</option><option>D</option><option>F</option>
</select>
</label>
<button onclick="addElective()">Add Elective</button>
</div>

<button onclick="renderTranscript()">Generate Transcript</button>

<div id="output" class="transcript"></div>

<div class="seal">🎓</div>
</div>

<script>
// CORE COURSES
const coreCoursesByGrade={
9:[["English I",1],["Algebra I",1],["Biology",1],["World History",1]],
10:[["English II",1],["Geometry",1],["Chemistry",1],["U.S. History",1]],
11:[["English III",1],["Algebra II",1],["Physics",1],["Government",0.5]],
12:[["English IV",1],["Advanced Math",1],["Economics",0.5],["Senior Capstone",1]]
};

// CAREER ZONES
const careerZones={
engineering:{
 name:"Architecture & Engineering",
 label:"STEM / Engineering Concentration",
 pathway:{
 9:["Introduction to Engineering"],
 10:["Computer Science I","Physics"],
 11:["Robotics","Engineering Design"],
 12:["Engineering Capstone","AP Physics"]
 },
 summary:"completed a focused four-year program emphasizing engineering, technology, and applied STEM coursework."
},
arts:{
 name:"Arts & Entertainment",
 label:"Fine & Performing Arts Concentration",
 pathway:{
 9:["Visual Arts I"],
 10:["Music Theory","Digital Art"],
 11:["Theater Arts","Photography"],
 12:["Arts Portfolio Capstone","Media Production"]
 },
 summary:"completed a four-year arts concentration emphasizing creative production, performance, and portfolio development."
}
};

// ELECTIVES STORAGE
let electives=[];

// POPULATE CAREER SELECT
const cs=document.getElementById("careerSelect");
for(const k in careerZones){
 let o=document.createElement("option");
 o.value=k;
 o.textContent=careerZones[k].name;
 cs.appendChild(o);
}

// GPA MAP
const gradePoints={A:4,B:3,C:2,D:1,F:0};

function addElective(){
 electives.push({
  name:electiveName.value,
  credits:parseFloat(electiveCredits.value),
  grade:electiveGrade.value
 });
 electiveName.value="";
 electiveCredits.value="";
}

function renderTranscript(){
 const career=careerZones[careerSelect.value];
 let totalCredits=0,totalPoints=0;

 let html=`
 <h2>${schoolName.value}</h2>
 <h3>Official High School Transcript</h3>
 <p><strong>Student:</strong> ${studentName.value}<br>
 <strong>Graduation Year:</strong> ${gradYear.value}</p>

 <h3>Core Academic Courses</h3>
 <table><tr><th>Course</th><th>Credits</th></tr>`;

 for(const g in coreCoursesByGrade){
  coreCoursesByGrade[g].forEach(c=>{
   html+=`<tr><td>${c[0]}</td><td>${c[1]}</td></tr>`;
   totalCredits+=c[1];
  });
 }
 html+=`</table>`;

 html+=`
 <h3>${career.label}</h3>
 <table><tr><th>Course</th></tr>`;
 for(const g in career.pathway){
  career.pathway[g].forEach(c=>{
   html+=`<tr class="highlight"><td>${c}</td></tr>`;
  });
 }
 html+=`</table>`;

 if(electives.length){
  html+=`
  <h3>Electives & Enrichment</h3>
  <table><tr><th>Course</th><th>Credits</th><th>Grade</th></tr>`;
  electives.forEach(e=>{
   html+=`<tr><td>${e.name}</td><td>${e.credits}</td><td>${e.grade}</td></tr>`;
   totalCredits+=e.credits;
   totalPoints+=e.credits*gradePoints[e.grade];
  });
  html+=`</table>`;
 }

 const gpa=(totalPoints/totalCredits||0).toFixed(2);

 html+=`
 <div class="summary">
 This student ${career.summary}
 </div>

 <p><strong>Total Credits:</strong> ${totalCredits}<br>
 <strong>Calculated GPA:</strong> ${gpa}</p>

 <p>Administrator Signature: ____________________________<br>
 Date: ____________________</p>
 `;

 output.innerHTML=html;
}
</script>
</body>
</html>
