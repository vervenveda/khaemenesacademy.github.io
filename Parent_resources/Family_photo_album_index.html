<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Family Photo Album — Flip Book</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0f1a;
    --ink:#2a2520;
    --ink-soft:#5c5146;
    --paper:#fffcf5;
    --edge:#efe3cf;
    --gold:#d9b878;
    --gold2:#b89252;
    --radius:7px;
    --shadow:0 24px 44px rgba(0,0,0,.45);
    --line-height:1.7;
    --ok:#0f766e;
    --bad:#b42318;
  }
  *{box-sizing:border-box;}

  html,body{
    margin:0;
    background:
      radial-gradient(circle at 50% 0%, rgba(60,90,150,.35), transparent 55%),
      var(--bg);
    color:#f8f4ec;
    font-family:"Cormorant Garamond",serif;
    min-height:100vh;
  }

  .wrap{
    max-width:1333px;
    margin:24px auto 40px;
    padding:24px 16px;
  }

  header{
    text-align:center;
    margin:10px 11px 20px;
  }

  .title{
    font-family:"Cinzel",serif;
    letter-spacing:.28em;
    text-transform:uppercase;
    font-size:32px;
  }

  .sub{
    opacity:.85;
    letter-spacing:.18em;
    font-size:11px;
    text-transform:uppercase;
  }

  /* Controls row */

  .controls{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin:10px 7px 10px;
  }

  .ctrl-field{
    display:flex;
    flex-direction:column;
    min-width:160px;
    max-width:260px;
  }

  .ctrl-label{
    font-size:10px;
    letter-spacing:.16em;
    text-transform:uppercase;
    opacity:.85;
    margin-bottom:3px;
  }

  .ctrl-text,
  .ctrl-notes{
    border:2px solid rgba(255,255,255,.35);
    background:rgba(10,18,40,.9);
    color:#fff;
    font-family:"Cormorant Garamond",serif;
    font-size:13px;
    padding:7px 9px;
    border-radius:7px;
  }

  .ctrl-notes{
    min-height:32px;
    max-height:72px;
    resize:vertical;
  }

  .ctrl-text:focus,
  .ctrl-notes:focus{
    outline:none;
    border-color:var(--gold);
  }

  .ctrl-file{
    font-size:11px;
    color:#e9dfcc;
    padding:6px 0;
  }

  .btn-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    align-items:flex-end;
  }

  .btn{
    border:2px solid rgba(255,255,255,.45);
    background:rgba(10,18,40,.9);
    color:#fff;
    letter-spacing:.16em;
    text-transform:uppercase;
    font-size:10px;
    padding:10px 14px;
    border-radius:7px;
    cursor:pointer;
    transition:.2s ease;
    white-space:nowrap;
  }

  .btn:hover{
    transform:translateY(-1px);
    box-shadow:0 7px 14px rgba(0,0,0,.4);
  }

  .btn.gold{
    border-color:var(--gold);
    background:linear-gradient(135deg,#3b2a17,#6c4a22);
  }

  .btn.ghost{
    background:transparent;
    border-color:rgba(255,255,255,.25);
  }

  .btn.danger{
    background:transparent;
    border-color:rgba(255,255,255,.25);
    color:#ffb3ad;
  }

  .btn:disabled{
    opacity:.45;
    cursor:default;
    transform:none;
    box-shadow:none;
  }

  .hint-line{
    font-size:10px;
    color:#e9dfcc;
    opacity:.8;
    margin-top:3px;
  }

  .status{
    max-width:999px;
    margin:0 auto 10px;
    padding:8px 12px;
    border-radius:9px;
    border:1px solid rgba(255,255,255,.18);
    background:rgba(0,0,0,.28);
    color:#f8f4ec;
    text-align:center;
    letter-spacing:.06em;
    font-size:11px;
    text-transform:uppercase;
  }
  .status.ok{
    border-color:rgba(15,118,110,.35);
    background:rgba(15,118,110,.12);
  }
  .status.bad{
    border-color:rgba(180,35,24,.35);
    background:rgba(180,35,24,.12);
  }

  .info{
    text-align:center;
    margin:6px 0 8px;
    color:#e9dfcc;
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
  }

  .searchrow{
    max-width:999px;
    margin:0 auto 12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:space-between;
    align-items:center;
  }

  .searchrow input[type="search"]{
    flex:1 1 200px;
    border:2px solid rgba(255,255,255,.35);
    background:rgba(10,18,40,.9);
    color:#fff;
    font-size:12px;
    padding:7px 10px;
    border-radius:999px;
  }

  .searchrow input[type="search"]:focus{
    outline:none;
    border-color:var(--gold);
  }

  .album-count{
    font-size:11px;
    color:#e9dfcc;
    letter-spacing:.12em;
    text-transform:uppercase;
    white-space:nowrap;
  }

  /* Book container */

  .book{
    perspective:1222px;
    margin:7px auto;
    max-width:999px;
    padding:24px;
    background:radial-gradient(circle at 50% 0%, rgba(255,255,255,.05), rgba(0,0,0,.7));
    border:11px solid rgba(255,255,255,.08);
    border-radius:7px;
    box-shadow:var(--shadow);
  }

  .spread{
    display:flex;
    gap:3px;
    justify-content:center;
    align-items:stretch;
  }

  .page{
    width:555px;
    min-height:333px;
    background:var(--paper);
    color:var(--ink);
    border:11px solid var(--edge);
    border-radius:7px;
    box-shadow:0 11px 24px rgba(0,0,0,.35);
    padding:24px 33px 33px;
    position:relative;
    overflow:hidden;
  }

  .page-inner{
    height:100%;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  .heading{
    font-size:11px;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:#a88758;
    margin-bottom:6px;
  }

  .pagetitle{
    font-family:"Cinzel",serif;
    font-size:13px;
    letter-spacing:.24em;
    text-transform:uppercase;
    margin-bottom:10px;
    color:#3b2a17;
  }

  .photo-frame{
    width:100%;
    flex:0 0 auto;
    aspect-ratio:4/3;
    border-radius:5px;
    border:1px solid #dec99e;
    background:linear-gradient(135deg,#e9ddc2,#f7f0df);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    margin-bottom:10px;
  }

  .photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform .2s ease, filter .2s ease;
  }

  .placeholder{
    font-size:11px;
    color:#b19a7a;
    letter-spacing:.12em;
    text-transform:uppercase;
  }

  .body{
    flex:1;
    overflow:hidden;
    line-height:var(--line-height);
    font-size:13px;
    color:var(--ink-soft);
    white-space:pre-wrap;
  }

  .meta-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:6px;
    gap:6px;
  }

  .meta{
    font-size:10px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:#b19a7a;
  }

  .page-actions{
    display:flex;
    gap:4px;
  }

  .mini-btn{
    border:none;
    border-radius:999px;
    padding:3px 8px;
    font-size:9px;
    letter-spacing:.12em;
    text-transform:uppercase;
    background:rgba(0,0,0,.04);
    color:#7b6650;
    cursor:pointer;
  }

  .mini-btn:hover{
    background:rgba(0,0,0,.09);
  }

  .mini-btn.danger{
    color:#b42318;
  }

  .mini-btn:disabled{
    opacity:.35;
    cursor:default;
  }

  .num{
    position:absolute;
    right:11px;
    bottom:7px;
    font-size:10px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#957f66;
  }

  /* Turn animation */
  .turning-left .page.right,
  .turning-right .page.left{
    animation:flipOut .44s ease forwards;
    transform-origin:left center;
  }
  .turning-left .page.left,
  .turning-right .page.right{
    animation:flipIn .44s ease forwards;
    transform-origin:right center;
  }
  @keyframes flipOut{
    0%{transform:rotateY(0) translateX(0); filter:brightness(1);}
    100%{transform:rotateY(12deg) translateX(-8px); filter:brightness(.94);}
  }
  @keyframes flipIn{
    0%{transform:rotateY(-10deg) translateX(8px); filter:brightness(.94);}
    100%{transform:rotateY(0) translateX(0); filter:brightness(1);}
  }

  .navrow{
    display:flex;
    justify-content:center;
    gap:11px;
    margin:11px 0 0;
  }

  .navbtn:disabled{
    opacity:.45;
    cursor:default;
    transform:none;
    box-shadow:none;
  }

  /* Adjust panel */

  .adjust-panel{
    margin:16px auto 0;
    max-width:555px;
    background:rgba(0,0,0,.22);
    border-radius:9px;
    padding:10px 12px 12px;
    border:1px solid rgba(255,255,255,.18);
  }

  .adjust-title{
    font-size:10px;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin-bottom:6px;
    opacity:.88;
  }

  .adjust-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:6px;
    flex-wrap:wrap;
  }

  .adjust-row label{
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    flex:1;
  }

  .adjust-row select,
  .adjust-row input[type="range"]{
    width:100%;
  }

  .adjust-value{
    font-size:10px;
    min-width:40px;
    text-align:right;
  }

  /* Responsive */
  @media(max-width:900px){
    .spread{
      flex-direction:column;
    }
    .page{
      width:100%;
      min-height:260px;
    }
  }

  @media(max-width:600px){
    .wrap{
      padding:16px 10px;
      margin:12px auto 24px;
    }
    .title{
      font-size:24px;
      letter-spacing:.2em;
    }
    .controls{
      align-items:stretch;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">Family Photo Album</div>
    <div class="sub">Private • Local • Sovereign</div>
  </header>

  <!-- Top controls -->
  <div class="controls">
    <div class="ctrl-field">
      <div class="ctrl-label">Images</div>
      <input id="photoFiles" class="ctrl-file" type="file" accept="image/*" multiple />
      <div class="hint-line">
        Stored only in this browser (localStorage). Never uploaded.
      </div>
    </div>

    <div class="ctrl-field">
      <div class="ctrl-label">Title (optional)</div>
      <input id="photoTitle" class="ctrl-text" type="text" placeholder="e.g. Beach at Sunset" />
    </div>

    <div class="ctrl-field">
      <div class="ctrl-label">Notes / Journal</div>
      <textarea id="photoNotes" class="ctrl-notes" placeholder="Where were you? Who was there? What do you want to remember?"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn gold" id="addPhotoBtn">Add to Album</button>
      <button class="btn ghost" id="backupBtn" title="Download a JSON backup of this album">Backup JSON</button>
      <button class="btn ghost" id="importBtn" title="Restore from a JSON backup">Import JSON</button>
      <button class="btn danger" id="clearAllBtn" title="Erase the album from this device">Clear Album</button>
    </div>
  </div>

  <!-- hidden import input -->
  <input id="importFile" type="file" accept="application/json" style="display:none;" />

  <div class="status ok" id="status">Ready. This album is fully local to this device.</div>
  <div class="info" id="pageInfo">Spread 1 of 1 — 0 photos</div>

  <div class="searchrow">
    <input id="searchInput" type="search" placeholder="Search by title or notes…" />
    <div class="album-count" id="albumCount">0 photos</div>
  </div>

  <!-- Flip book -->
  <div class="book" id="book">
    <div class="spread">
      <!-- Left page -->
      <article class="page left">
        <div class="page-inner">
          <div class="heading">Memory</div>
          <div class="pagetitle" id="L_title"></div>
          <div class="photo-frame">
            <img id="L_img" alt="" />
            <div class="placeholder" id="L_placeholder" style="display:none;">Blank Page</div>
          </div>
          <div class="body" id="L_body"></div>
          <div class="meta-row">
            <div class="meta" id="L_meta"></div>
            <div class="page-actions">
              <button class="mini-btn" id="L_edit">Edit</button>
              <button class="mini-btn danger" id="L_delete">Delete</button>
            </div>
          </div>
          <div class="num" id="L_num"></div>
        </div>
      </article>

      <!-- Right page -->
      <article class="page right">
        <div class="page-inner">
          <div class="heading">Memory</div>
          <div class="pagetitle" id="R_title"></div>
          <div class="photo-frame">
            <img id="R_img" alt="" />
            <div class="placeholder" id="R_placeholder" style="display:none;">Blank Page</div>
          </div>
          <div class="body" id="R_body"></div>
          <div class="meta-row">
            <div class="meta" id="R_meta"></div>
            <div class="page-actions">
              <button class="mini-btn" id="R_edit">Edit</button>
              <button class="mini-btn danger" id="R_delete">Delete</button>
            </div>
          </div>
          <div class="num" id="R_num"></div>
        </div>
      </article>
    </div>

    <div class="navrow">
      <button class="btn navbtn" id="prevBtn">&laquo; Previous</button>
      <button class="btn navbtn" id="nextBtn">Next &raquo;</button>
    </div>

    <!-- Image adjustments -->
    <div class="adjust-panel">
      <div class="adjust-title">Image Adjustments</div>

      <div class="adjust-row">
        <label for="adjustTarget">Target</label>
        <select id="adjustTarget">
          <option value="both">Both Pages</option>
          <option value="left">Left Page</option>
          <option value="right">Right Page</option>
        </select>
      </div>

      <div class="adjust-row">
        <label for="brightnessRange">Brightness</label>
        <input type="range" id="brightnessRange" min="0.5" max="1.5" step="0.05" value="1" />
        <span class="adjust-value" id="brightnessLabel">1.00</span>
      </div>

      <div class="adjust-row">
        <label for="contrastRange">Contrast</label>
        <input type="range" id="contrastRange" min="0.5" max="1.5" step="0.05" value="1" />
        <span class="adjust-value" id="contrastLabel">1.00</span>
      </div>

      <div class="adjust-row">
        <label for="zoomRange">Zoom</label>
        <input type="range" id="zoomRange" min="0.75" max="1.25" step="0.05" value="1" />
        <span class="adjust-value" id="zoomLabel">1.00</span>
      </div>

      <div class="adjust-row" style="justify-content:flex-end;">
        <button class="mini-btn" id="resetAdjustBtn">Reset Adjustments</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const LS_KEY = "pearl_flip_album_v1";

  /** entries: {id, created, title, notes, dataUrl, b, c, z} */
  let entries = [];
  let filteredIndices = [];
  let leftIndex = 0; // index in filteredIndices for left page

  // Elements
  const fileInput   = document.getElementById("photoFiles");
  const titleInput  = document.getElementById("photoTitle");
  const notesInput  = document.getElementById("photoNotes");
  const addBtn      = document.getElementById("addPhotoBtn");
  const backupBtn   = document.getElementById("backupBtn");
  const importBtn   = document.getElementById("importBtn");
  const importFile  = document.getElementById("importFile");
  const clearBtn    = document.getElementById("clearAllBtn");
  const searchInput = document.getElementById("searchInput");
  const statusEl    = document.getElementById("status");
  const pageInfoEl  = document.getElementById("pageInfo");
  const countEl     = document.getElementById("albumCount");
  const bookEl      = document.getElementById("book");

  const L = {
    img: document.getElementById("L_img"),
    placeholder: document.getElementById("L_placeholder"),
    title: document.getElementById("L_title"),
    body: document.getElementById("L_body"),
    meta: document.getElementById("L_meta"),
    num: document.getElementById("L_num"),
    edit: document.getElementById("L_edit"),
    del: document.getElementById("L_delete")
  };

  const R = {
    img: document.getElementById("R_img"),
    placeholder: document.getElementById("R_placeholder"),
    title: document.getElementById("R_title"),
    body: document.getElementById("R_body"),
    meta: document.getElementById("R_meta"),
    num: document.getElementById("R_num"),
    edit: document.getElementById("R_edit"),
    del: document.getElementById("R_delete")
  };

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  // Adjust controls
  const adjustTarget   = document.getElementById("adjustTarget");
  const brightnessRange= document.getElementById("brightnessRange");
  const contrastRange  = document.getElementById("contrastRange");
  const zoomRange      = document.getElementById("zoomRange");
  const brightnessLabel= document.getElementById("brightnessLabel");
  const contrastLabel  = document.getElementById("contrastLabel");
  const zoomLabel      = document.getElementById("zoomLabel");
  const resetAdjustBtn = document.getElementById("resetAdjustBtn");

  /* ========== Helpers ========== */

  function normalizeAdjust(entry){
    if(typeof entry.b !== "number") entry.b = 1;
    if(typeof entry.c !== "number") entry.c = 1;
    if(typeof entry.z !== "number") entry.z = 1;
  }

  function loadEntries(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if(!raw){
        entries = [];
        return;
      }
      const parsed = JSON.parse(raw);
      entries = Array.isArray(parsed) ? parsed : [];
      entries.forEach(normalizeAdjust);
    }catch(e){
      console.warn("Failed to load album", e);
      entries = [];
    }
  }

  function saveEntries(){
    try{
      localStorage.setItem(LS_KEY, JSON.stringify(entries));
    }catch(e){
      console.error("Failed to save album", e);
      setStatus("Could not save — storage may be full.", "bad");
    }
  }

  function setStatus(message, kind){
    statusEl.textContent = message;
    statusEl.className = "status " + (kind || "ok");
  }

  function formatWhen(ts){
    const d = new Date(ts);
    return d.toLocaleDateString() + " · " +
      d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  }

  function createId(){
    return "p_" + Date.now().toString(36) + "_" +
           Math.random().toString(36).slice(2,7);
  }

  /* ========== Filtering & rendering ========== */

  function recomputeFiltered(){
    const q = (searchInput.value || "").trim().toLowerCase();
    filteredIndices = [];
    entries.forEach((entry, idx)=>{
      if(!q){
        filteredIndices.push(idx);
      }else{
        const hay = ((entry.title || "") + " " + (entry.notes || "")).toLowerCase();
        if(hay.includes(q)) filteredIndices.push(idx);
      }
    });

    if(!filteredIndices.length){
      leftIndex = 0;
      return;
    }

    const maxSpreadLeft = Math.max(0, (Math.ceil(filteredIndices.length/2)-1)*2);
    if(leftIndex > maxSpreadLeft) leftIndex = maxSpreadLeft;
    leftIndex = leftIndex - (leftIndex % 2);
  }

  function applyFilters(sideObj, entry){
    if(!entry){
      sideObj.img.style.filter = "";
      sideObj.img.style.transform = "";
      return;
    }
    normalizeAdjust(entry);
    const b = entry.b;
    const c = entry.c;
    const z = entry.z;
    sideObj.img.style.filter = "brightness(" + b + ") contrast(" + c + ")";
    sideObj.img.style.transform = "scale(" + z + ")";
    sideObj.img.style.transformOrigin = "center center";
  }

  function fillSide(sideObj, entryIndex, filteredPos){
    if(entryIndex === null){
      sideObj.img.style.display = "none";
      sideObj.img.src = "";
      sideObj.placeholder.style.display = "flex";
      sideObj.title.textContent = "";
      sideObj.body.textContent = "";
      sideObj.meta.textContent = "";
      sideObj.num.textContent = "";
      sideObj.edit.disabled = true;
      sideObj.del.disabled = true;
      sideObj.edit.dataset.id = "";
      sideObj.del.dataset.id = "";
      applyFilters(sideObj, null);
      return;
    }

    const entry = entries[entryIndex];
    normalizeAdjust(entry);

    sideObj.placeholder.style.display = "none";
    sideObj.img.style.display = "block";
    sideObj.img.src = entry.dataUrl;
    sideObj.img.alt = entry.title || "Album photo";

    sideObj.title.textContent = entry.title || "Untitled";
    sideObj.body.textContent = entry.notes || "";
    sideObj.meta.textContent = formatWhen(entry.created);
    sideObj.num.textContent = "Photo " + (filteredPos + 1);

    sideObj.edit.disabled = false;
    sideObj.del.disabled = false;
    sideObj.edit.dataset.id = entry.id;
    sideObj.del.dataset.id = entry.id;

    applyFilters(sideObj, entry);
  }

  function render(anim){
    recomputeFiltered();

    const total = filteredIndices.length;
    const spreads = Math.max(1, Math.ceil(total / 2));
    const currentSpread = total ? (Math.floor(leftIndex/2) + 1) : 1;

    pageInfoEl.textContent = total
      ? "Spread " + currentSpread + " of " + spreads + " — " + total + " photo" + (total===1?"":"s")
      : "Album is empty — add a photo to begin";

    countEl.textContent = total + (total===1 ? " photo" : " photos");

    const leftPos = total ? leftIndex : null;
    const rightPos = (total && leftIndex + 1 < total) ? leftIndex + 1 : null;

    const leftEntryIndex  = (leftPos  !== null) ? filteredIndices[leftPos]  : null;
    const rightEntryIndex = (rightPos !== null) ? filteredIndices[rightPos] : null;

    fillSide(L, leftEntryIndex,  leftPos  !== null ? leftPos : 0);
    fillSide(R, rightEntryIndex, rightPos !== null ? rightPos : 0);

    prevBtn.disabled = (total === 0 || leftIndex <= 0);
    nextBtn.disabled = (total === 0 || (leftIndex + 2 >= total));

    bookEl.classList.remove("turning-left","turning-right");
    if(anim === "left")  bookEl.classList.add("turning-left");
    if(anim === "right") bookEl.classList.add("turning-right");
    setTimeout(()=>bookEl.classList.remove("turning-left","turning-right"), 450);

    syncSlidersFromCurrent();
  }

  /* ========== Add photos ========== */

  // Optional: shrink images to a max dimension to avoid huge localStorage usage
  function downscaleImage(dataUrl, maxSize){
    maxSize = maxSize || 1200;
    return new Promise(resolve=>{
      const img = new Image();
      img.onload = () => {
        const longest = Math.max(img.width, img.height);
        if(longest <= maxSize){
          return resolve(dataUrl);
        }
        const ratio = maxSize / longest;
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        try{
          const resized = canvas.toDataURL("image/jpeg", 0.9);
          resolve(resized);
        }catch(e){
          console.warn("toDataURL failed, using original", e);
          resolve(dataUrl);
        }
      };
      img.onerror = ()=> resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  async function handleAdd(){
    const files = Array.from(fileInput.files || []);

    if(!files.length){
      alert("Please choose at least one image file.");
      return;
    }

    const baseTitle = (titleInput.value || "").trim();
    const notes = (notesInput.value || "").trim();

    let added = 0;

    for(let i = 0; i < files.length; i++){
      const file = files[i];
      if(!file.type.startsWith("image/")) continue;

      const reader = new FileReader();
      const dataUrl = await new Promise(resolve=>{
        reader.onload = ev => resolve(String(ev.target.result || ""));
        reader.onerror = () => resolve("");
        reader.readAsDataURL(file);
      });

      if(!dataUrl) continue;

      const resized = await downscaleImage(dataUrl, 1200);

      const entry = {
        id: createId(),
        created: Date.now(),
        title: files.length > 1
          ? (baseTitle ? (baseTitle + " (" + (i+1) + ")") : file.name)
          : (baseTitle || file.name),
        notes,
        dataUrl: resized,
        b: 1,
        c: 1,
        z: 1
      };

      entries.push(entry);
      added++;
    }

    if(added){
      saveEntries();
      setStatus("Added " + added + " photo" + (added===1?"":"s") + " to this device.", "ok");
      fileInput.value = "";
      titleInput.value = "";
      render("left");
    }else{
      setStatus("No images were added.", "bad");
    }
  }

  /* ========== Edit / delete ========== */

  function findIndexById(id){
    return entries.findIndex(e => e.id === id);
  }

  function editEntry(id){
    const idx = findIndexById(id);
    if(idx === -1) return;

    const entry = entries[idx];

    const newTitle = prompt("Edit title:", entry.title || "");
    if(newTitle === null) return; // cancelled

    const newNotes = prompt("Edit notes / journal:", entry.notes || "");
    if(newNotes === null) return; // cancelled

    entry.title = newTitle.trim();
    entry.notes = newNotes.trim();
    saveEntries();
    setStatus("Entry updated.", "ok");
    render();
  }

  function deleteEntry(id){
    const idx = findIndexById(id);
    if(idx === -1) return;
    const label = entries[idx].title || "this entry";
    if(!confirm('Delete "' + label + '" from this device\'s album?\nThis cannot be undone.')) return;

    entries.splice(idx, 1);
    saveEntries();
    setStatus("Entry deleted from this device.", "ok");
    render();
  }

  ["L_edit","R_edit"].forEach(function(id){
    const btn = document.getElementById(id);
    btn.addEventListener("click", function(){
      if(btn.disabled) return;
      const entryId = btn.dataset.id;
      if(entryId) editEntry(entryId);
    });
  });

  ["L_delete","R_delete"].forEach(function(id){
    const btn = document.getElementById(id);
    btn.addEventListener("click", function(){
      if(btn.disabled) return;
      const entryId = btn.dataset.id;
      if(entryId) deleteEntry(entryId);
    });
  });

  /* ========== Clear & backup & import ========== */

  function clearAll(){
    if(!entries.length){
      alert("Album is already empty.");
      return;
    }
    if(!confirm("Erase the entire album on this device?\nThis cannot be undone.")) return;
    entries = [];
    saveEntries();
    leftIndex = 0;
    setStatus("Album cleared from this device.", "ok");
    render();
  }

  function backup(){
    if(!entries.length){
      alert("No photos to back up yet.");
      return;
    }
    const payload = {
      exportedAt: new Date().toISOString(),
      count: entries.length,
      entries: entries
    };
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "pearl-photo-album-backup.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setStatus("Backup downloaded as JSON.", "ok");
  }

  function handleImport(){
    const file = importFile.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e){
      try{
        const raw = String(e.target.result || "");
        const data = JSON.parse(raw);
        if(!data || !Array.isArray(data.entries)){
          alert("Invalid backup file.");
          importFile.value = "";
          return;
        }
        if(!confirm("Replace current album with " + data.entries.length + " photo(s) from backup?")){
          importFile.value = "";
          return;
        }

        entries = data.entries.map(function(ent){
          const safe = {
            id: ent.id || createId(),
            created: ent.created || Date.now(),
            title: ent.title || "",
            notes: ent.notes || "",
            dataUrl: ent.dataUrl || ""
          };
          normalizeAdjust(safe);
          return safe;
        }).filter(function(ent){
          return !!ent.dataUrl;
        });

        saveEntries();
        leftIndex = 0;
        setStatus("Album restored from backup on this device.", "ok");
        render();
      }catch(err){
        console.error(err);
        alert("Could not read backup file.");
      }finally{
        importFile.value = "";
      }
    };
    reader.onerror = function(){
      alert("Failed to read file.");
      importFile.value = "";
    };
    reader.readAsText(file);
  }

  /* ========== Adjustments ========== */

  function getCurrentEntry(side){
    if(!filteredIndices.length) return null;
    if(side === "L"){
      if(leftIndex >= filteredIndices.length) return null;
      return entries[ filteredIndices[leftIndex] ];
    }else if(side === "R"){
      const pos = leftIndex + 1;
      if(pos >= filteredIndices.length) return null;
      return entries[ filteredIndices[pos] ];
    }
    return null;
  }

  function updateAdjustLabels(){
    brightnessLabel.textContent = parseFloat(brightnessRange.value).toFixed(2);
    contrastLabel.textContent   = parseFloat(contrastRange.value).toFixed(2);
    zoomLabel.textContent       = parseFloat(zoomRange.value).toFixed(2);
  }

  function syncSlidersFromCurrent(){
    const target = adjustTarget.value;
    const entryL = getCurrentEntry("L");
    const entryR = getCurrentEntry("R");
    let entry = null;

    if(target === "left" && entryL) entry = entryL;
    else if(target === "right" && entryR) entry = entryR;
    else if(target === "both") entry = entryL || entryR || null;
    else entry = entryL || entryR || null;

    const b = entry && typeof entry.b === "number" ? entry.b : 1;
    const c = entry && typeof entry.c === "number" ? entry.c : 1;
    const z = entry && typeof entry.z === "number" ? entry.z : 1;

    brightnessRange.value = b.toFixed(2);
    contrastRange.value   = c.toFixed(2);
    zoomRange.value       = z.toFixed(2);
    updateAdjustLabels();
  }

  function applyAdjustmentsFromSliders(){
    if(!filteredIndices.length) return;

    const target = adjustTarget.value;
    const b = parseFloat(brightnessRange.value) || 1;
    const c = parseFloat(contrastRange.value) || 1;
    const z = parseFloat(zoomRange.value) || 1;

    const entryL = getCurrentEntry("L");
    const entryR = getCurrentEntry("R");

    if(target === "both" || target === "left"){
      if(entryL){
        entryL.b = b;
        entryL.c = c;
        entryL.z = z;
        applyFilters(L, entryL);
      }
    }
    if(target === "both" || target === "right"){
      if(entryR){
        entryR.b = b;
        entryR.c = c;
        entryR.z = z;
        applyFilters(R, entryR);
      }
    }

    saveEntries();
  }

  function resetAdjustments(){
    const target = adjustTarget.value;
    const entryL = getCurrentEntry("L");
    const entryR = getCurrentEntry("R");

    if(target === "both" || target === "left"){
      if(entryL){
        entryL.b = 1;
        entryL.c = 1;
        entryL.z = 1;
        applyFilters(L, entryL);
      }
    }
    if(target === "both" || target === "right"){
      if(entryR){
        entryR.b = 1;
        entryR.c = 1;
        entryR.z = 1;
        applyFilters(R, entryR);
      }
    }
    saveEntries();
    syncSlidersFromCurrent();
  }

  adjustTarget.addEventListener("change", function(){
    syncSlidersFromCurrent();
  });

  brightnessRange.addEventListener("input", function(){
    updateAdjustLabels();
    applyAdjustmentsFromSliders();
  });
  contrastRange.addEventListener("input", function(){
    updateAdjustLabels();
    applyAdjustmentsFromSliders();
  });
  zoomRange.addEventListener("input", function(){
    updateAdjustLabels();
    applyAdjustmentsFromSliders();
  });

  resetAdjustBtn.addEventListener("click", function(){
    resetAdjustments();
  });

  /* ========== Navigation & search ========== */

  prevBtn.addEventListener("click", function(){
    if(leftIndex <= 0) return;
    leftIndex = Math.max(0, leftIndex - 2);
    render("right");
  });

  nextBtn.addEventListener("click", function(){
    if(leftIndex + 2 >= filteredIndices.length) return;
    leftIndex = leftIndex + 2;
    render("left");
  });

  document.addEventListener("keydown", function(e){
    if(e.key === "ArrowLeft")  prevBtn.click();
    if(e.key === "ArrowRight") nextBtn.click();
  });

  searchInput.addEventListener("input", function(){
    render();
  });

  addBtn.addEventListener("click", handleAdd);
  clearBtn.addEventListener("click", clearAll);
  backupBtn.addEventListener("click", backup);
  importBtn.addEventListener("click", function(){ importFile.click(); });
  importFile.addEventListener("change", handleImport);

  /* ========== Init ========== */

  loadEntries();
  render();
  setStatus("Ready. This album lives only in this browser.", "ok");
})();
</script>
</body>
</html>
